<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WACL — CoRL Project</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 720px;
      width: 100%;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #1a1a2e;
      border: 1px solid #3a3a5c;
      border-radius: 4px;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8888cc;
      padding: 0.3rem 0.8rem;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff;
      line-height: 1.1;
      margin-bottom: 1.25rem;
    }

    h1 span {
      color: #6c63ff;
    }

    p.lead {
      font-size: 1.1rem;
      color: #aaaaaa;
      line-height: 1.7;
      margin-bottom: 2.5rem;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      padding: 0.5rem 1.25rem;
      font-size: 0.9rem;
      color: #888;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f0a500;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    footer {
      margin-top: 4rem;
      font-size: 0.75rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">CoRL 2025</div>
    <h1>WACL<br><span>Coming Soon</span></h1>
    <p class="lead">
      Project page under construction. Check back soon for paper, code, and results.
    </p>
    <div class="status">
      <div class="dot"></div>
      Work in progress
    </div>
  </div>
  <footer>&copy; 2025 WACL</footer>
</body>
</html>
